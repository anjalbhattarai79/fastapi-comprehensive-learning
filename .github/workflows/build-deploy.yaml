name: Build and Deploy code

on: [push, pull_request]

jobs:
  Continuous-Integration:
    runs-on: ubuntu-latest
    environment: 
     name: testing
    env:
      DATABASE_HOSTNAME: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: ${{secrets.DATABASE_NAME}}
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: admin
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: ${{secrets.DATABASE_NAME}}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fastapi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest psycopg2-binary

      - name: Install postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        env:
          PGPASSWORD: admin
        run: |
          until pg_isready -h localhost -p 5432 -U postgres -d fastapi_test; do
            echo "Waiting for postgres..."
            sleep 2
          done
          psql -h localhost -U postgres -d fastapi_test -c "select 1;"

      - name: Run tests
        run: pytest -v
      
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #    username: ${{ secrets.DOCKER_HUB_USERNAME }}
      #    password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3

      # - name: Build and push
      #   id: docker_build
      #   uses: docker/build-push-action@v6
      #   with:
      #    context: .
      #    file: ./Dockerfile
      #    push: true
      #    tags: |
      #     ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi-fullcourse:latest
      #     ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi-fullcourse:${{ github.sha }}
      #    cache-from: type=gha
      #    cache-to: type=gha,mode=max

  Continuous-Deployment:
    needs: [Continuous-Integration] # Allos Sequential execution of jobs instead of parallel
    runs-on: ubuntu-latest
    environment: 
     name: production
    steps:
      - name: pulling git repo
        uses: actions/checkout@v2
      - name: deploying to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12 # This is the action
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: ${{secrets.HEROKU_APP_NAME}}
          heroku_email: ${{secrets.HEROKU_EMAIL}}

      